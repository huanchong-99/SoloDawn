# SoloDawn Quality Gate Configuration
#
# 质量门策略定义 — 控制代码质量的自动检查和阻断行为
# 质量门模型设计参考 SonarQube (LGPL-3.0)
#
# 模式说明:
#   off     — 关闭质量门，走旧流程
#   shadow  — 运行分析并记录结果，但不阻断流程（观察期）
#   warn    — 分析并回流问题到终端，但不硬性阻断合并
#   enforce — 硬性门禁，不通过则阻断

mode: enforce

# ── 终端级质量门 ──
# 触发时机: 每次 checkpoint commit
# 目标: 快速阻断当前终端产出的低级错误
terminal_gate:
  name: "Terminal Gate"
  conditions:
    - metric: cargo_check_errors
      operator: "GT"
      threshold: "0"
    - metric: clippy_errors
      operator: "GT"
      threshold: "0"
    - metric: tsc_errors
      operator: "GT"
      threshold: "0"
    - metric: rust_test_failures
      operator: "GT"
      threshold: "0"
    - metric: frontend_test_failures
      operator: "GT"
      threshold: "0"
    # Fix #4: test files importing undeclared @testing-library/* etc. must block.
    - metric: frontend_test_deps_missing
      operator: "GT"
      threshold: "0"
    # Built-in rules: block on critical issues
    - metric: builtin_rust_critical
      operator: "GT"
      threshold: "0"
    - metric: builtin_frontend_critical
      operator: "GT"
      threshold: "0"
    - metric: secrets_detected
      operator: "GT"
      threshold: "0"
    # Completeness: block if project has source but zero test files
    - metric: test_file_absence
      operator: "GT"
      threshold: "0"

# ── 分支级质量门 ──
# 触发时机: 任务最后一个终端通过后
# 目标: 覆盖整个 task branch 的完整检查
#
# 注意: `eslint_errors` **不在**条件集中。ESLint 是 advisory 工具（见
# `crates/quality/src/rule.rs::Severity::cap_for_advisory`），其 rule
# 严重级别由 LLM 生成的 `.eslintrc` 决定，按模型而异 —— 让标签决定
# 阻断意味着让"模型口味"决定质量门，这与质量门的契约相悖。前端
# 真正的阻断信号来自 `tsc_errors` 和 `test_failures`。
branch_gate:
  name: "Branch Gate"
  conditions:
    - metric: cargo_check_errors
      operator: "GT"
      threshold: "0"
    - metric: clippy_warnings
      operator: "GT"
      threshold: "0"
    - metric: clippy_errors
      operator: "GT"
      threshold: "0"
    - metric: fmt_violations
      operator: "GT"
      threshold: "0"
    - metric: tsc_errors
      operator: "GT"
      threshold: "0"
    - metric: test_failures
      operator: "GT"
      threshold: "0"
    # Built-in rules: tolerance threshold for branch-level
    - metric: builtin_rust_issues
      operator: "GT"
      threshold: "10"
    - metric: builtin_frontend_issues
      operator: "GT"
      threshold: "10"
    - metric: duplicated_blocks
      operator: "GT"
      threshold: "5"
    - metric: secrets_detected
      operator: "GT"
      threshold: "0"
    - metric: rust_cyclomatic_complexity
      operator: "GT"
      threshold: "25"
    - metric: line_coverage
      operator: "LT"
      threshold: "60"
    # Completeness: block skeleton services, high TODO density, migration debris
    - metric: test_file_absence
      operator: "GT"
      threshold: "0"
    - metric: skeleton_service_count
      operator: "GT"
      threshold: "0"
    - metric: todo_density
      operator: "GT"
      threshold: "5"
    - metric: migration_debris_files
      operator: "GT"
      threshold: "0"

# ── 仓库级质量门 ──
# 触发时机: 合并主分支前 / GitHub Actions
# 目标: 统一 Sonar 质量门、全量测试、构建、部署检查
repo_gate:
  name: "Repo Gate"
  conditions:
    - metric: cargo_check_errors
      operator: "GT"
      threshold: "0"
    - metric: clippy_warnings
      operator: "GT"
      threshold: "0"
    - metric: clippy_errors
      operator: "GT"
      threshold: "0"
    - metric: fmt_violations
      operator: "GT"
      threshold: "0"
    # Note: `eslint_errors` is intentionally absent here as well — see the
    # branch_gate comment above. ESLint severity is decided by a model-drafted
    # `.eslintrc`, so it cannot gate even at repo level. `tsc_errors` and
    # `test_failures` are the authoritative frontend signals.
    - metric: tsc_errors
      operator: "GT"
      threshold: "0"
    - metric: test_failures
      operator: "GT"
      threshold: "0"
    - metric: sonar_blocker_issues
      operator: "GT"
      threshold: "0"
    - metric: sonar_critical_issues
      operator: "GT"
      threshold: "0"
    - metric: security_issues
      operator: "GT"
      threshold: "0"
    # Built-in rules: zero tolerance for repo gate
    - metric: builtin_rust_critical
      operator: "GT"
      threshold: "0"
    - metric: builtin_frontend_critical
      operator: "GT"
      threshold: "0"
    - metric: builtin_common_issues
      operator: "GT"
      threshold: "5"
    - metric: secrets_detected
      operator: "GT"
      threshold: "0"
    - metric: duplicated_blocks
      operator: "GT"
      threshold: "3"
    - metric: line_coverage
      operator: "LT"
      threshold: "80"
    # Completeness: strictest thresholds at repo level
    - metric: test_file_absence
      operator: "GT"
      threshold: "0"
    - metric: skeleton_service_count
      operator: "GT"
      threshold: "0"
    - metric: todo_density
      operator: "GT"
      threshold: "3"
    - metric: migration_debris_files
      operator: "GT"
      threshold: "0"

# ── Provider 启用/禁用 ──
providers:
  rust: true
  frontend: true
  repo: true
  security: true
  sonar: true
  # Built-in analysis providers (no external service needed)
  builtin_rust: true
  builtin_frontend: true
  builtin_common: true
  coverage: true
  completeness: true

# ── SonarQube 本地配置 ──
sonar:
  host_url: "http://localhost:9000"
  project_key: "solodawn"
  # token 建议通过环境变量 SONAR_TOKEN 设置
  # token: null
