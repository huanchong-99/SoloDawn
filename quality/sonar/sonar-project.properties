# SoloDawn SonarQube 项目配置
#
# 本地 SonarQube 分析使用此配置文件
# 详情参见: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/analysis-parameters/

sonar.projectKey=solodawn
sonar.projectName=SoloDawn
sonar.projectVersion=1.0

# 源代码目录
sonar.sources=crates,frontend/src,shared
sonar.tests=crates,frontend/src

# 文件包含/排除
sonar.inclusions=**/*.rs,**/*.ts,**/*.tsx,**/*.js,**/*.jsx
sonar.exclusions=**/target/**,**/node_modules/**,**/vendor/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# 测试文件模式
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*_test.rs,**/tests/**

# 语言设置 — Rust 通过 clippy SARIF 导入
sonar.rust.clippy.reportPaths=quality/reports/clippy-sarif.json

# TypeScript/JavaScript
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# 编码
sonar.sourceEncoding=UTF-8

# 质量门 — 新代码优先策略
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
