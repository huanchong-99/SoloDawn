# Faster linkers per target — `rust-lld` (bundled with the Rust toolchain, so
# no system install is needed) significantly speeds up link times on Windows
# MSVC vs the slow default `link.exe`.
#
# On Windows MSVC we used to set `/DEBUG` for better PDB symbols, but that
# forces the slow MSVC linker path. Keep `/DEBUG` only for release builds
# (where link time is dwarfed by codegen) via a separate mechanism; dev
# builds prefer speed.
#
# macOS intentionally keeps the default `cc`/ld64 linker and only sets the
# framework link-args below: driving `rust-lld` directly there bypasses the
# clang driver that supplies the SDK sysroot and framework search paths, and
# `-C linker-flavor=darwin-ld.lld` is not even a valid flavor (rustc rejects
# it), which broke the macOS release build.

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-framework",
    "-C", "link-arg=AppKit",
    "-C", "link-arg=-framework",
    "-C", "link-arg=ApplicationServices",
    "-C", "link-arg=-framework",
    "-C", "link-arg=Foundation",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-framework",
    "-C", "link-arg=AppKit",
    "-C", "link-arg=-framework",
    "-C", "link-arg=ApplicationServices",
    "-C", "link-arg=-framework",
    "-C", "link-arg=Foundation",
]

# Windows MSVC: use rust-lld (shipped with the toolchain) instead of the slow
# default `link.exe`. Drop the old `/DEBUG` rustflag that forced full PDB
# generation on every dev build; we keep backtraces via
# `[profile.dev] debug = "line-tables-only"` in Cargo.toml, which is enough
# for panic location reporting and much faster.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"
rustflags = []

[target.aarch64-pc-windows-msvc]
linker = "rust-lld"
rustflags = []

[env]
AWS_LC_SYS_STATIC = "0"
AWS_LC_SYS_NO_PREGENERATED_SRC = "0"
# NOTE(W2-35-02): Forcing SQLX_OFFLINE=true globally in `.cargo/config.toml`
# means every local `cargo build` uses the committed `crates/db/.sqlx/`
# query cache. If a developer edits a sqlx macro query but forgets to run
# `cargo sqlx prepare --workspace`, the build will silently succeed against
# a stale cache and CI will fail later (or worse, at runtime with a type
# mismatch). Consider:
#   - dropping this override and letting developers opt-in via env,
#   - or adding a pre-commit hook that runs `cargo sqlx prepare --check`.
# NOTE(W2-35-03): The cache lives at `crates/db/.sqlx/` but is used by
# every workspace crate that imports `db`. There is no check that the cache
# is up to date with migrations under `crates/db/migrations/` — a new
# migration without a matching `cargo sqlx prepare` silently uses the old
# schema. Add a CI job that runs `cargo sqlx prepare --check --workspace`
# against a fresh DB built from all migrations.
SQLX_OFFLINE = "true"
