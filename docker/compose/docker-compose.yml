services:
  solodawn:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      args:
        SOLODAWN_BUILD_NETWORK_PROFILE: ${SOLODAWN_BUILD_NETWORK_PROFILE:-official}
        INSTALL_AI_CLIS: ${INSTALL_AI_CLIS:-0}
        BUILDKIT_INLINE_CACHE: "1"
    working_dir: ${SOLODAWN_WORKSPACE_ROOT:-/workspace}
    ports:
      - "${PORT:-23456}:23456"
    volumes:
      - solodawn-data:/var/lib/solodawn
      - ${HOST_WORKSPACE_ROOT:-../..}:${SOLODAWN_WORKSPACE_ROOT:-/workspace}
    environment:
      - SOLODAWN_ASSET_DIR=/var/lib/solodawn/assets
      - SOLODAWN_TEMP_DIR=/var/lib/solodawn
      - SOLODAWN_ALLOWED_ROOTS=${SOLODAWN_ALLOWED_ROOTS:-/workspace,/var/lib/solodawn}
      - HOST=0.0.0.0
      - PORT=23456
      - RUST_LOG=${RUST_LOG:-info}
      - SOLODAWN_ENCRYPTION_KEY=${SOLODAWN_ENCRYPTION_KEY:-}
      - SOLODAWN_API_TOKEN=${SOLODAWN_DOCKER_API_TOKEN:-}
      - SOLODAWN_LOCAL_MODE=${SOLODAWN_LOCAL_MODE:-0}
      - SOLODAWN_AUTO_SETUP_PROJECTS=${SOLODAWN_AUTO_SETUP_PROJECTS:-1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Quality gate configuration
      - QUALITY_GATE_MODE=${QUALITY_GATE_MODE:-shadow}
      - SONAR_TOKEN=${SONAR_TOKEN:-}
      - SONAR_HOST_URL=${SONAR_HOST_URL:-http://sonarqube:9000}
      - SONAR_PROJECT_KEY=${SONAR_PROJECT_KEY:-solodawn}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23456/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # Data retention: schedule cleanup-quality-data.sh via host cron:
    #   0 3 * * 0 docker exec solodawn /bin/bash /opt/solodawn/scripts/cleanup-quality-data.sh

  # Opt-in via the "sonarqube" Compose profile; see sonarqube service below.
  sonarqube-db:
    profiles: ["sonarqube"]
    image: postgres:15
    environment:
      - POSTGRES_USER=${SONAR_DB_USER:-sonar}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:?SONAR_DB_PASSWORD is required (set in .env)}
      - POSTGRES_DB=sonarqube
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # SonarQube services are opt-in via the "sonarqube" Compose profile.
  # Enable with: `docker compose --profile sonarqube up -d`
  sonarqube:
    profiles: ["sonarqube"]
    image: sonarqube:10.5-community
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:?SONAR_DB_PASSWORD is required (set in .env)}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "curl", "-fail", "--silent", "http://localhost:9000/api/system/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  # NOTE: Volume name changed from gitcortex-data to solodawn-data.
  # Existing deployments: rename your volume or recreate it.
  # docker volume create solodawn-data
  # docker run --rm -v gitcortex-data:/from -v solodawn-data:/to alpine sh -c "cp -a /from/. /to/"
  solodawn-data:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
