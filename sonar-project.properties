sonar.projectKey=huanchong-99_GitCortex
sonar.organization=huanchong-99

sonar.sources=crates,frontend/src,shared
sonar.tests=crates,frontend/src

sonar.inclusions=**/*.rs,**/*.ts,**/*.tsx,**/*.js,**/*.jsx
sonar.exclusions=**/target/**,**/node_modules/**,**/vendor/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/Cargo.toml

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*_test.rs,**/tests/**

sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Rust workspace uses a single root Cargo.lock — sub-crate Cargo.toml files
# do not need their own lock files. Suppress S8570 false positives.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=text:S8570
sonar.issue.ignore.multicriteria.e1.resourceKey=crates/**/Cargo.toml
