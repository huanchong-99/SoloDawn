# ============================================================================
# CI Workflow: Windows Installer Build
# Triggers: manual (workflow_dispatch) only
# Jobs: build-installer
# Produces: SoloDawn-Setup-v{version}.exe as a workflow ARTIFACT (not a release
#           asset). SoloDawn 1.0+ ships source-run with no prebuilt installer;
#           run this workflow by hand whenever a Windows .exe is desired.
# ============================================================================
name: Build Windows Installer

on:
  # Manual trigger only. Tag pushes no longer auto-build an installer, so
  # releases stay installer-free. A maintainer runs this by hand to produce a
  # Windows .exe on demand; the artifact lives in the run (30-day retention)
  # rather than being auto-published to any release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    # --- Rust setup ---
    - name: Setup Rust environment
      uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # stable
      with:
        toolchain: nightly-2025-12-04

    - name: Cache Rust dependencies
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-installer-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-installer-

    # --- Node.js setup ---
    # Install pnpm BEFORE setup-node so setup-node's `cache: 'pnpm'` resolver
    # (which runs `pnpm store path`) can find pnpm on PATH.
    - name: Install pnpm
      run: npm install -g pnpm@10.13.1

    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install frontend dependencies
      run: pnpm install --frozen-lockfile

    # --- Build frontend ---
    - name: Build frontend
      working-directory: frontend
      run: pnpm build

    # --- Build Rust binaries ---
    - name: Build solodawn-server
      run: cargo build --release -p server

    - name: Build solodawn-tray
      run: cargo build --release -p solodawn-tray

    # --- Prepare installer build directory ---
    - name: Prepare build directory
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        New-Item -ItemType Directory -Path installer/build -Force | Out-Null
        if (-not (Test-Path target/release/server.exe)) {
          throw "Missing build artifact: target/release/server.exe"
        }
        if (-not (Test-Path target/release/solodawn-tray.exe)) {
          throw "Missing build artifact: target/release/solodawn-tray.exe"
        }
        Copy-Item target/release/server.exe installer/build/solodawn-server.exe -ErrorAction Stop
        Copy-Item target/release/solodawn-tray.exe installer/build/solodawn-tray.exe -ErrorAction Stop

    # --- Create placeholder icon if not present ---
    - name: Create placeholder icon
      shell: pwsh
      run: |
        if (-not (Test-Path installer/assets/solodawn.ico)) {
          # Create a minimal valid ICO file (1x1 pixel, for CI builds)
          # In production, replace with a real icon
          $iconBytes = [byte[]]@(
            0x00, 0x00, 0x01, 0x00, 0x01, 0x00, 0x10, 0x10,
            0x00, 0x00, 0x01, 0x00, 0x20, 0x00, 0x68, 0x04,
            0x00, 0x00, 0x16, 0x00, 0x00, 0x00
          )
          # Write a minimal ICO header; real icon should be provided
          [System.IO.File]::WriteAllBytes("installer/assets/solodawn.ico", $iconBytes)
          Write-Host "Created placeholder icon (replace with real .ico for production)"
        }

    # --- Install Inno Setup ---
    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        Write-Host "Inno Setup installed"

    # --- Build installer ---
    - name: Build installer
      shell: pwsh
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          # Try chocolatey path
          $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source
        }
        if (-not $iscc) {
          Write-Error "ISCC.exe not found"
          exit 1
        }
        & $iscc installer/solodawn.iss

    # --- Upload installer as a workflow artifact (NOT a release asset) ---
    # SoloDawn 1.0+ ships source-run; the installer is built on demand and
    # held as a run artifact for the maintainer, never auto-published.
    - name: Upload installer artifact
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4
      with:
        name: SoloDawn-Windows-Installer
        path: installer/output/SoloDawn-Setup-*.exe
        retention-days: 30
