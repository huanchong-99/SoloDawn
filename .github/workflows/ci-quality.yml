# ============================================================================
# CI Workflow: Quality Gate Check
# Branches: main, phase-18-release-readiness
# Triggers: push to branch, pull_request targeting branch
# Required check for: PR to main (quality-gate job)
#                      Release tags (all jobs)
# Jobs: sonar-analysis, quality-gate
# ============================================================================
name: Quality Gate Check

on:
  push:
    branches: [ main, phase-18-release-readiness ]
  pull_request:
    branches: [ main, phase-18-release-readiness ]

jobs:
  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0 # Full history for better blame/analysis

    # Usually SonarQube would be run here using the official action
    # Note: Requires SONAR_TOKEN secret to be configured in GitHub repository
    - name: SonarScan
      uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true # Allowed to fail if token not set during initial phases

  quality-gate:
    name: Quality Gate Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: true
      AWS_LC_SYS_STATIC: "1"
      AWS_LC_SYS_NO_PREGENERATED_SRC: "1"
      LIBGIT2_SYS_USE_PKG_CONFIG: "1"

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libsqlite3-dev \
          libgit2-dev \
          zlib1g-dev \
          cmake \
          ninja-build \
          clang \
          libclang-dev \
          perl \
          nasm \
          libssl-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
      with:
        toolchain: nightly-2025-12-04

    - name: Cache dependencies
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-quality-${{ hashFiles('**/Cargo.lock') }}

    - name: Run quality gate (shadow mode)
      run: bash scripts/quality/run-quality-gate.sh repo shadow
      continue-on-error: true
