# ============================================================================
# CI Workflow: Quality Gate Check
# Branches: main, phase-18-release-readiness
# Triggers: push to branch, pull_request targeting branch
# Required check for: PR to main (quality-gate job)
#                      Release tags (all jobs)
# Jobs: sonar-analysis, quality-gate
# ============================================================================
name: Quality Gate Check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, phase-18-release-readiness ]
  pull_request:
    branches: [ main, phase-18-release-readiness ]

jobs:
  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0 # Full history for better blame/analysis

    # Usually SonarQube would be run here using the official action
    # Note: Requires SONAR_TOKEN secret to be configured in GitHub repository
    - name: SonarScan
      uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true # Allowed to fail if token not set during initial phases

  quality-gate:
    name: Quality Gate Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust
      with:
        components: ''

    - name: Setup sccache
      uses: ./.github/actions/setup-sccache

    - name: Run quality gate (shadow mode)
      run: bash scripts/quality/run-quality-gate.sh repo ${QUALITY_GATE_MODE:-shadow}
      continue-on-error: ${{ env.QUALITY_GATE_MODE == 'shadow' }}
      env:
        QUALITY_GATE_MODE: shadow

    - name: Show sccache statistics
      if: always()
      run: sccache --show-stats
