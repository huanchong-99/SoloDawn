# ============================================================================
# CI Workflow: Basic Checks
# Branches: main, phase-18-release-readiness
# Triggers: push to branch, pull_request targeting branch
# Required check for: PR to main (backend-check, frontend-check jobs)
#                      Push to main (backend-check job)
#                      Release tags (all jobs)
# Jobs: backend-check, frontend-check
# ============================================================================
name: Basic Checks

on:
  push:
    branches: [ main, phase-18-release-readiness ]
  pull_request:
    branches: [ main, phase-18-release-readiness ]

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust
      with:
        install-nextest: 'true'

    - name: Setup sccache
      uses: ./.github/actions/setup-sccache

    - name: Run cargo clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Run cargo nextest
      run: cargo nextest run --workspace --lib --test-threads=1

    - name: Show sccache statistics
      if: always()
      run: sccache --show-stats

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup frontend environment
      uses: ./.github/actions/setup-frontend

    - name: Run tests
      working-directory: frontend
      run: pnpm test:run

    - name: Run lint
      working-directory: frontend
      run: pnpm run lint

    - name: Run type check
      working-directory: frontend
      run: pnpm run check
