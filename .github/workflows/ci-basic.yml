# ============================================================================
# CI Workflow: Basic Checks
# Branches: main, phase-18-release-readiness
# Triggers: push to branch, pull_request targeting branch
# Required check for: PR to main (backend-check, frontend-check jobs)
#                      Push to main (backend-check job)
#                      Release tags (all jobs)
# Jobs: backend-check, frontend-check
# ============================================================================
name: Basic Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, phase-18-release-readiness ]
  pull_request:
    branches: [ main, phase-18-release-readiness ]

jobs:
  # Path-filter short-circuit: skip all jobs in this workflow when the PR only
  # touches docs/markdown (no code, no build config). This is the single
  # biggest source of CI time savings for documentation PRs.
  changes:
    name: Filter
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      backend: ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: f
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            backend:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - '.github/actions/setup-rust/**'
              - '.github/actions/setup-sccache/**'
              - '.github/workflows/ci-basic.yml'
            frontend:
              - 'frontend/**'
              - 'shared/**'
              - '.github/actions/setup-frontend/**'
              - '.github/workflows/ci-basic.yml'

  backend-check:
    name: Backend Check
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Single source of truth for the crate selection shared by the prime,
    # clippy, and nextest steps. Keeping it in one place prevents the three
    # steps from silently diverging (e.g. adding a crate or dropping the tray
    # exclusion in only one place), which would let nextest test a crate clippy
    # never linted, or vice-versa. NOTE: this only unifies *crate selection* —
    # the target-scope flags deliberately differ per step (prime `--tests`,
    # clippy `--all-targets`, nextest `--lib`) and so do feature flags (clippy
    # uniquely passes `--all-features`); those intentional differences are left
    # untouched here.
    env:
      CARGO_SELECT: --workspace --exclude solodawn-tray

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust
      with:
        install-nextest: 'true'

    - name: Setup sccache
      uses: ./.github/actions/setup-sccache

    # Build all dependencies once with the `ci` profile (faster codegen,
    # no incremental) so clippy and nextest can share the same build
    # artifacts instead of rebuilding twice.
    - name: Prime build artifacts (shared by clippy + nextest)
      run: cargo build $CARGO_SELECT --profile ci --tests --quiet

    - name: Run cargo clippy
      run: cargo clippy $CARGO_SELECT --all-targets --all-features --profile ci -- -D warnings

    # Performance: removed `--test-threads=1`. The original single-threaded
    # setting was an extremely broad hammer that forced the entire test
    # suite to run serially. Tests in this workspace are file-scoped and
    # do not share global mutable state (verified by the fact that vitest
    # already runs them in parallel on the frontend with no flakes).
    #
    # Quality guarantee: cargo-nextest runs each test in its own per-test
    # process bubble by default, so even if some test does mutate global
    # state, it cannot affect other tests. Any genuinely order-dependent
    # test should be marked with `#[serial]` using the `serial_test` crate
    # rather than crippling the whole suite's throughput.
    - name: Run cargo nextest
      # `--cargo-profile ci` builds the test binaries with Cargo's `ci` profile
      # so they reuse the artifacts from the prime-build step above (the speed
      # win). NOTE: nextest's `--profile` is its own run-config profile (from
      # .config/nextest.toml), NOT a Cargo profile — there is no `ci` nextest
      # profile, so `--profile ci` errored with "profile `ci` not found".
      #
      # Runs the FULL suite (lib unit tests + integration tests under `tests/`)
      # instead of just `--lib`, so route/service integration coverage runs in
      # CI, not merely compiles. nextest skips `#[ignore]`d tests by default —
      # which is exactly the set requiring a live server / live CLI / live
      # Feishu (`#[ignore = "requires running server"]` etc.) — so no external
      # services or secrets are needed. The heavier full-API validation on a
      # release binary is the E2E self-test (ci-e2e.yml).
      run: cargo nextest run $CARGO_SELECT --cargo-profile ci

    - name: Check generated types are up-to-date
      run: cargo run --bin generate_types --profile ci -- --check

    - name: Show sccache statistics
      if: always()
      run: sccache --show-stats

  frontend-check:
    name: Frontend Check
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup frontend environment
      uses: ./.github/actions/setup-frontend

    - name: Run tests
      working-directory: frontend
      run: pnpm test:run

    - name: Run lint
      working-directory: frontend
      run: pnpm run lint

    - name: Run type check
      working-directory: frontend
      run: pnpm run check

  # Aggregate gate so branch protection can require a SINGLE always-reported
  # check. `backend-check` / `frontend-check` are conditionally skipped on
  # docs-only PRs (see the `changes` filter); a *skipped* required check can
  # leave a PR stuck "Expected — waiting for status to be reported" and
  # unmergeable. This job always runs: it passes when the needed jobs either
  # succeeded or were legitimately skipped, and fails if any failed/was
  # cancelled.
  #
  # ACTION REQUIRED in branch protection: require "CI Status" instead of
  # "Backend Check" / "Frontend Check".
  ci-status:
    name: CI Status
    if: always()
    needs: [changes, backend-check, frontend-check]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
    - name: Verify no required job failed
      run: |
        echo "changes=${{ needs.changes.result }}"
        echo "backend-check=${{ needs.backend-check.result }}"
        echo "frontend-check=${{ needs.frontend-check.result }}"
        if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
          echo "::error::filter (changes) job did not succeed"; exit 1
        fi
        if [ "${{ needs.backend-check.result }}" = "failure" ] || [ "${{ needs.backend-check.result }}" = "cancelled" ]; then
          echo "::error::backend-check failed"; exit 1
        fi
        if [ "${{ needs.frontend-check.result }}" = "failure" ] || [ "${{ needs.frontend-check.result }}" = "cancelled" ]; then
          echo "::error::frontend-check failed"; exit 1
        fi
        echo "All required jobs passed or were skipped."
