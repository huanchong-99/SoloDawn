# ============================================================================
# CI Workflow: Basic Checks
# Branches: main, phase-18-release-readiness
# Triggers: push to branch, pull_request targeting branch
# Required check for: PR to main (backend-check, frontend-check jobs)
#                      Push to main (backend-check job)
#                      Release tags (all jobs)
# Jobs: backend-check, frontend-check
# ============================================================================
name: Basic Checks

on:
  push:
    branches: [ main, phase-18-release-readiness ]
  pull_request:
    branches: [ main, phase-18-release-readiness ]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true
  AWS_LC_SYS_STATIC: "1"
  AWS_LC_SYS_NO_PREGENERATED_SRC: "1"
  LIBGIT2_SYS_USE_PKG_CONFIG: "1"

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libsqlite3-dev \
          libgit2-dev \
          zlib1g-dev \
          cmake \
          ninja-build \
          clang \
          libclang-dev \
          perl \
          nasm \
          libssl-dev \
          protobuf-compiler

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
      with:
        toolchain: nightly-2025-12-04
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run cargo check
      run: cargo check --workspace --lib --bins

    - name: Run cargo clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Run cargo test
      run: cargo test --workspace --lib -- --test-threads=1

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    
    - name: Setup pnpm
      uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
      with:
        version: 10
        
    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install dependencies
      working-directory: frontend
      run: pnpm install

    - name: Run tests
      working-directory: frontend
      run: pnpm test:run

    - name: Run lint
      working-directory: frontend
      run: pnpm run lint

    - name: Run type check
      working-directory: frontend
      run: pnpm run check
