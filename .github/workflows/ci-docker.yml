# ============================================================================
# CI Workflow: Docker Build Check
# Branches: main, phase-18-release-readiness
# Triggers: push to branch, pull_request targeting branch
# Required check for: Release tags (docker-build job)
# Jobs: docker-build
# ============================================================================
name: Docker Build Check

on:
  push:
    branches: [ main, phase-18-release-readiness ]
  pull_request:
    branches: [ main, phase-18-release-readiness ]

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DOCKER_BUILDKIT: 1

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Record build start time
      id: build-start
      run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

    - name: Build Docker image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: docker/Dockerfile
        push: false
        tags: gitcortex:ci-test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Report build duration
      if: always()
      run: |
        start=${{ steps.build-start.outputs.start }}
        end=$(date +%s)
        duration=$((end - start))
        minutes=$((duration / 60))
        seconds=$((duration % 60))
        echo "### Docker Build Duration" >> "$GITHUB_STEP_SUMMARY"
        echo "Build completed in **${minutes}m ${seconds}s** (${duration}s total)" >> "$GITHUB_STEP_SUMMARY"
