# ============================================================================
# CI Workflow: E2E Self-Test (Multi-Platform)
# Triggers: push to main, PR to main, manual dispatch
# Jobs: e2e matrix (windows-latest, ubuntu-latest, macos-latest)
# Runs `server self-test --json` on a clean OS to verify full API coverage
# ============================================================================
#
# COST: $0 — uses ONLY standard GitHub-hosted runners (free for public repos)
# NEVER use larger runners (*-xlarge or any paid option)
#
name: E2E Self-Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: target/release/server.exe
          - os: ubuntu-latest
            binary: target/release/server
          - os: macos-latest
            binary: target/release/server

    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    # --- System dependencies ---
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libsqlite3-dev \
          libgit2-dev \
          zlib1g-dev \
          cmake \
          ninja-build \
          clang \
          libclang-dev \
          perl \
          nasm \
          libssl-dev \
          protobuf-compiler

    - name: Install protobuf (macOS)
      if: runner.os == 'macOS'
      run: brew install protobuf cmake

    - name: Install protobuf (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        choco install protoc -y --no-progress
        echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> "$GITHUB_ENV"

    # --- Rust toolchain ---
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # stable
      with:
        toolchain: nightly-2025-12-04

    - name: Cache Rust dependencies
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-e2e-

    - name: Set build environment
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
        echo "SQLX_OFFLINE=true" >> "$GITHUB_ENV"

    # --- Node.js + frontend build ---
    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: '22'

    - name: Install pnpm and build frontend
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
      run: |
        npm install -g pnpm@10.13.1
        pnpm install --frozen-lockfile
        cd frontend && pnpm build

    # --- Build server binary ---
    - name: Build server (release)
      run: cargo build --release -p server

    # --- Run self-test ---
    - name: Run E2E self-test
      shell: bash
      env:
        # Test-only placeholder key (32 bytes); not a real secret
        SOLODAWN_ENCRYPTION_KEY: ${{ secrets.E2E_TEST_ENCRYPTION_KEY || 'test-key-placeholder-not-secret-ci-only-0000' }}
        SOLODAWN_LOCAL_MODE: "1"
        SOLODAWN_NO_BROWSER: "1"
        RUST_LOG: "warn,server=info"
      run: |
        ${{ matrix.binary }} self-test --json 2>self-test-stderr.log | tee self-test-results.json
        echo "--- stderr ---"
        cat self-test-stderr.log

    # --- Verify results ---
    - name: Check test results
      if: always()
      shell: bash
      run: |
        if [ ! -f self-test-results.json ] || [ ! -s self-test-results.json ]; then
          echo "::error::No self-test results found"
          if [ -f self-test-stderr.log ]; then
            echo "--- stderr output ---"
            cat self-test-stderr.log
          fi
          exit 1
        fi

        # Parse results
        total=$(python3 -c "import json; r=json.load(open('self-test-results.json')); print(r.get('total',0))")
        passed=$(python3 -c "import json; r=json.load(open('self-test-results.json')); print(r.get('passed',0))")
        failed=$(python3 -c "import json; r=json.load(open('self-test-results.json')); print(r.get('failed',0))")
        duration=$(python3 -c "import json; r=json.load(open('self-test-results.json')); print(r.get('duration_ms',0))")

        echo "Total: $total | Passed: $passed | Failed: $failed | Duration: ${duration}ms"

        if [ "$failed" != "0" ]; then
          echo "::error::Self-test reported $failed failure(s) out of $total tests"
          # Print failed tests
          python3 -c "
        import json
        r = json.load(open('self-test-results.json'))
        for t in r.get('results', []):
            if not t.get('passed'):
                print(f\"  FAIL: [{t['group']}] {t['name']}: {t.get('error', 'unknown')}\")
        "
          exit 1
        fi

        echo "All $total self-tests passed in ${duration}ms"

  # ==========================================================================
  # Orchestration E2E — real CLI + real API key on clean Windows
  # Only runs on push to main or manual trigger (not PRs — protects secrets)
  # ==========================================================================
  e2e-orchestration:
    name: E2E Orchestration (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [e2e]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.e2e.result == 'success'

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Install protobuf (Windows)
      shell: bash
      run: |
        choco install protoc -y --no-progress
        echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> "$GITHUB_ENV"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # stable
      with:
        toolchain: nightly-2025-12-04

    - name: Cache Rust dependencies
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-e2e-

    - name: Set build environment
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
        echo "SQLX_OFFLINE=true" >> "$GITHUB_ENV"

    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: '22'

    - name: Install pnpm and build frontend
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
      run: |
        npm install -g pnpm@10.13.1
        pnpm install --frozen-lockfile
        cd frontend && pnpm build

    - name: Install Claude Code CLI
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code
        # Ensure npm global bin is in PATH for child processes
        NPM_GLOBAL_BIN="$(npm prefix -g)/bin"
        echo "NPM global bin: $NPM_GLOBAL_BIN"
        echo "$NPM_GLOBAL_BIN" >> "$GITHUB_PATH"
        # Also add AppData/npm for Windows
        echo "$APPDATA/npm" >> "$GITHUB_PATH"

    - name: Verify Claude Code installation
      shell: bash
      run: |
        which claude || where claude || echo "claude not in PATH yet"
        claude --version

    - name: Pre-configure Claude Code (skip ALL first-launch dialogs)
      shell: bash
      run: |
        # Claude Code stores user config in ~/.claude/
        CLAUDE_DIR="$HOME/.claude"
        mkdir -p "$CLAUDE_DIR"

        # Mark onboarding and terms as completed to skip ALL interactive dialogs:
        # - Theme selector
        # - Security notes ("Press Enter to continue")
        # - Workspace trust dialog
        # - Bypass permissions confirmation
        cat > "$CLAUDE_DIR/settings.json" << 'SETTINGS'
        {
          "permissions": {
            "allow": [],
            "deny": []
          },
          "hasCompletedOnboarding": true,
          "hasAcknowledgedDangerousSkipPermissions": true
        }
        SETTINGS

        # Also write the terms acceptance marker
        echo '{"accepted":true,"version":"2.0"}' > "$CLAUDE_DIR/terms_accepted.json"

        # Write a blank statsig file to skip analytics prompts
        echo '{}' > "$CLAUDE_DIR/statsig.json"

        echo "Pre-configured Claude Code at $CLAUDE_DIR"
        ls -la "$CLAUDE_DIR"

    - name: Build server (release)
      run: cargo build --release -p server

    - name: Run orchestration E2E test
      if: github.event_name != 'pull_request'
      shell: bash
      env:
        # Test-only placeholder key (32 bytes); not a real secret
        SOLODAWN_ENCRYPTION_KEY: ${{ secrets.E2E_TEST_ENCRYPTION_KEY || 'test-key-placeholder-not-secret-ci-only-0000' }}
        SOLODAWN_LOCAL_MODE: "1"
        SOLODAWN_NO_BROWSER: "1"
        RUST_LOG: "warn,server=info,services=info"
        E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
        E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
        E2E_MODEL: ${{ secrets.E2E_MODEL }}
      run: |
        target/release/server.exe self-test --json --orchestration 2>orchestration-stderr.log | tee orchestration-results.json
        echo "--- stderr ---"
        cat orchestration-stderr.log

    - name: Check orchestration results
      if: always()
      shell: bash
      run: |
        if [ ! -f orchestration-results.json ] || [ ! -s orchestration-results.json ]; then
          echo "::error::No orchestration test results found"
          if [ -f orchestration-stderr.log ]; then
            echo "--- stderr output ---"
            cat orchestration-stderr.log
          fi
          exit 1
        fi

        total=$(python3 -c "import json; r=json.load(open('orchestration-results.json')); print(r.get('total',0))")
        passed=$(python3 -c "import json; r=json.load(open('orchestration-results.json')); print(r.get('passed',0))")
        failed=$(python3 -c "import json; r=json.load(open('orchestration-results.json')); print(r.get('failed',0))")

        echo "Total: $total | Passed: $passed | Failed: $failed"

        if [ "$failed" != "0" ]; then
          echo "::error::Orchestration test reported $failed failure(s)"
          python3 -c "
        import json
        r = json.load(open('orchestration-results.json'))
        for t in r.get('results', []):
            if not t.get('passed'):
                err = t.get('error', 'unknown')
                print(f\"  FAIL: [{t['group']}] {t['name']}:\")
                print(f\"    {err[:500]}\")
        "
          exit 1
        fi

        echo "All orchestration tests passed"

    - name: Upload orchestration logs
      if: always()
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4
      with:
        name: orchestration-logs
        path: |
          orchestration-results.json
          orchestration-stderr.log
        retention-days: 7
