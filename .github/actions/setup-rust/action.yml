# ============================================================================
# Composite Action: Setup Rust Environment
# Installs system dependencies, Rust toolchain, and optional tools
# ============================================================================
name: 'Setup Rust Environment'
description: 'Install system dependencies, Rust toolchain, and configure build environment'

inputs:
  toolchain:
    description: 'Rust toolchain version'
    required: false
    default: 'nightly-2025-12-04'
  components:
    description: 'Rust components to install (comma-separated)'
    required: false
    default: 'rustfmt, clippy'
  install-nextest:
    description: 'Whether to install cargo-nextest'
    required: false
    default: 'false'
  extra-packages:
    description: 'Additional system packages to install (space-separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libsqlite3-dev \
          libgit2-dev \
          zlib1g-dev \
          cmake \
          ninja-build \
          clang \
          libclang-dev \
          perl \
          nasm \
          libssl-dev \
          protobuf-compiler

    - name: Install extra system packages
      if: inputs.extra-packages != ''
      shell: bash
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      run: |
        sudo apt-get install -y $EXTRA_PACKAGES

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Set build environment variables
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
        # NOTE(W2-35-04): CI sets SQLX_OFFLINE=true but never verifies the
        # `.sqlx/` cache is in sync with the committed migrations. If a PR
        # edits a migration but forgets to re-run `cargo sqlx prepare`, CI
        # will build against stale query metadata and may pass while
        # production breaks. Add a step that runs
        # `cargo sqlx prepare --check --workspace` (after applying
        # migrations to a scratch SQLite file) before `cargo build`.
        # NOTE(W2-35-05): The `.sqlx/` cache is not scoped per-target; a
        # query that is valid under one feature flag combination (e.g.
        # `default-features = false`) can be incorrectly cached from a
        # build with different features. Document which feature set is
        # canonical for `cargo sqlx prepare` and enforce it here.
        echo "SQLX_OFFLINE=true" >> "$GITHUB_ENV"
        echo "AWS_LC_SYS_STATIC=1" >> "$GITHUB_ENV"
        echo "AWS_LC_SYS_NO_PREGENERATED_SRC=1" >> "$GITHUB_ENV"
        echo "LIBGIT2_SYS_USE_PKG_CONFIG=1" >> "$GITHUB_ENV"

    - name: Install cargo-nextest (prebuilt binary)
      # Pre-built binary (~5s) instead of `cargo install --locked` (~3min from
      # source). Uses the official get.nexte.st distribution: the nextest GitHub
      # release does NOT publish per-target tarball assets, so the previous
      # github.com/.../releases/download URLs 404'd and failed CI. get.nexte.st
      # serves a gzipped tar with the `cargo-nextest` binary for each platform.
      if: inputs.install-nextest == 'true'
      shell: bash
      run: |
        set -euo pipefail
        NEXTEST_VERSION="0.9.88"
        case "${{ runner.os }}" in
          Linux)   URL="https://get.nexte.st/${NEXTEST_VERSION}/linux" ;;
          macOS)   URL="https://get.nexte.st/${NEXTEST_VERSION}/mac" ;;
          Windows) URL="https://get.nexte.st/${NEXTEST_VERSION}/windows-tar" ;;
          *) echo "Unsupported OS: ${{ runner.os }}" >&2; exit 1 ;;
        esac
        mkdir -p "${HOME}/.cargo/bin"
        # Tarball contains `cargo-nextest` (cargo-nextest.exe on Windows),
        # extracted straight onto PATH so `cargo nextest` resolves it.
        curl -LsSf --retry 5 --retry-connrefused "${URL}" | tar zxf - -C "${HOME}/.cargo/bin"
        cargo-nextest --version

    - name: Cache Rust build outputs (registry, git, target)
      # Complements sccache: sccache (GHA backend) caches rustc compilation
      # outputs, but NOT cargo's registry index, dependency metadata, or final
      # link artifacts — those are re-done every run. rust-cache restores
      # ~/.cargo/{registry,git} + target/, auto-scoping by job + Cargo.lock +
      # rustc version and pruning stale deps (safe alongside sccache; a raw
      # actions/cache on `target` would bloat and evict sccache's GHA entries).
      # Keyed on Cargo.lock so a clean dependency set never serves stale.
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        cache-all-crates: "true"
